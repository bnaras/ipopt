# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      IPOPT_VERSION: 3.14.19

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y coinor-libipopt-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ipopt pkg-config

      - name: Set macOS Build Flags for ipopt
        if: runner.os == 'macOS'
        run: |
          IPOPT_PREFIX=$(brew --prefix ipopt)
          echo "PKG_CONFIG_PATH=$IPOPT_PREFIX/lib/pkgconfig" >> $GITHUB_ENV
          echo "CPATH=$IPOPT_PREFIX/include" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$IPOPT_PREFIX/lib" >> $GITHUB_ENV

      - name: Download prebuilt Ipopt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = $env:IPOPT_VERSION
          $zip = "Ipopt-$ver-win64-msvs2022-md.zip"
          $url = "https://github.com/coin-or/Ipopt/releases/download/releases/$ver/$zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath C:\ipopt-dl -Force
          $ipoptHome = "C:\ipopt-dl\Ipopt-$ver-win64-msvs2022-md"
          # Build-time discovery (configure.win) + run-time DLL resolution.
          "IPOPT_HOME=$ipoptHome"  | Out-File -FilePath $env:GITHUB_ENV  -Append -Encoding utf8
          "$ipoptHome\bin"         | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
