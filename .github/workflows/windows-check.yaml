# Experimental: build/check on Windows against Ipopt's prebuilt release binary.
# Triggers ONLY on the `windows-ci` branch (and manual dispatch) so it does not
# run alongside the regular cross-platform R-CMD-check.
on:
  push:
    branches: [windows-ci]
  workflow_dispatch:

name: windows-check

permissions: read-all

jobs:
  windows-check:
    runs-on: windows-latest

    name: windows (release)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      IPOPT_VERSION: 3.14.19

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Download and extract prebuilt Ipopt (Windows binary)
        shell: pwsh
        run: |
          $ver = $env:IPOPT_VERSION
          $zip = "Ipopt-$ver-win64-msvs2022-md.zip"
          $url = "https://github.com/coin-or/Ipopt/releases/download/releases/$ver/$zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath C:\ipopt-dl -Force
          $ipoptHome = "C:\ipopt-dl\Ipopt-$ver-win64-msvs2022-md"
          Write-Host "IPOPT_HOME = $ipoptHome"
          Get-ChildItem "$ipoptHome\bin"
          # Build-time discovery (configure.win) + run-time DLL resolution.
          "IPOPT_HOME=$ipoptHome"  | Out-File -FilePath $env:GITHUB_ENV  -Append -Encoding utf8
          "$ipoptHome\bin"         | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
          args: 'c("--no-manual")'
